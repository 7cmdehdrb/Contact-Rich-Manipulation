env:
  num_envs: 128
  episode_length: 360
  device: cpu
  backend: newton
  warp_cache_dir: /tmp/warp_cache
  sim_fps: 30
  sim_substeps: 2
  joint_stiffness: 500.0
  joint_damping: 50.0
  viewer: gl
  headless: false
  render_every: 1
  render_fps: 30.0
  seed: 7
  action_scale: 0.04
  max_joint_delta: 0.08
  position_tracking_weight: -0.2
  fine_tracking_weight: 0.1
  fine_tracking_std: 0.1
  success_radius: 0.035
  success_reward: 0.0
  terminate_on_success: false
  action_penalty: 0.0
  action_rate_penalty: 0.0001
  joint_velocity_penalty: 0.0001
  target_low: [0.35, -0.20, 0.15]
  target_high: [0.65, 0.20, 0.50]

rsl_rl:
  device: cpu
  num_steps_per_env: 32
  save_interval: 100
  multi_gpu:
  obs_groups:
    actor: [policy]
    critic: [policy]
  actor:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [128, 128]
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 1.0
  critic:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [128, 128]
    activation: elu
    obs_normalization: true
  algorithm:
    class_name: rsl_rl.algorithms.PPO
    num_learning_epochs: 4
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    learning_rate: 0.001
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
    desired_kl: 0.01
    rnd_cfg:
    symmetry_cfg:
